name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install libgit2 (macOS)
        if: runner.os == 'macOS'
        run: brew install libgit2

      - name: Install libgit2 1.9 from source (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libssl-dev libssh2-1-dev
          git clone --depth 1 --branch v1.9.0 https://github.com/libgit2/libgit2.git /tmp/libgit2
          cmake -S /tmp/libgit2 -B /tmp/libgit2/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build /tmp/libgit2/build --parallel
          sudo cmake --install /tmp/libgit2/build
          sudo ldconfig

      - name: Build & test
        run: make test
