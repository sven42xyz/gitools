name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install libgit2 (macOS)
        if: runner.os == 'macOS'
        run: brew install libgit2

      - name: Install libgit2 (Linux)
        if: runner.os == 'Linux'
        run: |
          # Use the distro package (libgit2 1.7.2 on ubuntu-latest / 24.04),
          # which is the minimum version gitls supports — so CI tests against
          # the real floor rather than a hand-built newer release.
          sudo apt-get update
          sudo apt-get install -y libgit2-dev pkg-config

      - name: Build & test
        run: make test
